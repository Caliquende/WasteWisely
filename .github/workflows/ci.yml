name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]

    - name: Install Playwright Browsers
      run: playwright install --with-deps chromium

    - name: Run tests
      run: |
        pytest -v tests/test_classifier.py tests/test_scanner.py
      # Note: We skip windows-specific smoke tests on Linux CI
      # and we focus on core logic tests.

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev] || pip install -r requirements.txt || true
        pip install bandit[toml] pip-audit

    - name: Run Bandit security scan
      run: |
        bandit -r src/ -f screen --severity-level medium --confidence-level medium || true

    - name: Run pip-audit dependency scan
      run: |
        pip-audit || true

